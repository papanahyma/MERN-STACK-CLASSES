<!DOCTYPE html>
<html>
<head>
    <title>Table Task</title>
    <style>
        table {
            border-collapse: collapse;
            width: 70%;
            margin: 60px auto;
        }
        th, td {
            border: 3px solid black;
            padding: 6px;
            text-align: center;
        }
        th {
            background-color: white;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <th>No.</th>
        <th>Full Name</th>
        <th>Position</th>
        <th>Salary</th>
    </tr>
    <tr>
        <td>1</td>
        <td>Bill Gates</td>
        <td>Founder Microsoft</td>
        <td>$1000</td>
    </tr>
    <tr>
        <td>2</td>
        <td>Steve Jobs</td>
        <td>Founder Apple</td>
        <td>$1200</td>
    </tr>
    <tr>
        <td>3</td>
        <td>Larry Page</td>
        <td>Founder Google</td>
        <td>$1200</td>
    </tr>
    <tr>
        <td>4</td>
        <td>Mark Zuckerberg</td>
        <td>Founder Facebook</td>
        <td>$1400</td>
    </tr>
</table>

</body>
</html>
