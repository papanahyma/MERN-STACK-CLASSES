<!DOCTYPE html>
<html>
<head>
    <title>Weather Station</title>
    <style>
        body {
            text-align: center;
            font-family: serif;
        }

        h2 {
            margin-bottom: 5px;
        }

    

        table {
            border-collapse: seperate;
            border-spacing: 2px;
        }

        th, td {
            border: 1px solid;
            padding: 5px 10px;
            text-align: center;
        }

        th {
            font-weight: bold;
        }

    </style>
</head>
<body>

<h2>Weather Station</h2>

<div class="outer-box">
    <table border="5" cellspacing="0" cellpadding="10" align="center">
        <tr>
            <th rowspan="2">Station</th>
            <th colspan="2">Temperature</th>
            <th rowspan="2">Humidity</th>
            <th rowspan="2">Weather</th>
        </tr>
        <tr>
            <th>Max</th>
            <th>Min</th>
        </tr>
        <tr>
            <td>India</td>
            <td>27</td>
            <td>20</td>
            <td>50%</td>
            <td>Cloudy</td>
        </tr>
        <tr>
            <td>America</td>
            <td>7</td>
            <td>-2</td>
            <td>80%</td>
            <td>Rainy</td>
        </tr>
    </table>
</div>

</body>
</html>
