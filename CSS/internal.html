<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #heading {
            color: rgb(243, 10, 14);
            background-color: rgb(245, 199, 140);
            text-align: center;
        }

        ol {
            background-color: rgb(255, 208, 127);
            padding: 20px;
        }

        li{
            width: 150px;
            background-color: rgb(247, 163, 37);
            margin: 10px;
        }

    </style>
</head>
<body>
    <h1 id="heading">Example for ordered list </h1>
    <ol>
        <li>Address</li>
        <li>Team</li>
        <li>About</li>
        <li>Company</li>
        <li>Contact</li>
    </ol>
</body>
</html>
