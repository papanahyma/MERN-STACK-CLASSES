<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }header {
  background: #333;
  color: white;
  padding: 15px;
  text-align: center;
}

nav {
  background: #555;
  padding: 10px;
  text-align: center;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

nav a:hover {
  text-decoration: underline;
}

section {
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

button {
  padding: 10px;
  background: #333;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #555;
}

  </style>
</head>
<body><header>
  <h1>My Portfolio</h1>
  <p>Welcome to my personal website</p>
</header><nav>
  <a href="#about">About</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>
</nav><section id="about">
  <div class="card">
    <h2>About Me</h2>
    <p>Hello! I am a student learning web development.</p>
  </div>
</section><section id="projects">
  <div class="card">
    <h2>Projects</h2>
    <p>Project 1: Simple website</p>
    <p>Project 2: Calculator app</p>
  </div>
</section><section id="contact">
  <div class="card">
    <h2>Contact Me</h2>
    <p>Email: example@email.com</p>
    <button onclick="showMessage()">Click Me</button>
  </div>
</section><script>
  function showMessage() {
    alert("Thanks for visiting my portfolio!");
  }
</script></body>
</html>
