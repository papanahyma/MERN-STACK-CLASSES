<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
        }

        .main-container {
            width: 250px;
            padding: 20px;
            border: 8px solid maroon;
            border-radius: 20px;
            background-color: white;
            text-align: center;
            position: relative;
        }

        img[alt="college-logo"] {
            width: 100%;
            height: 100px;
            object-fit: contain;
        }

        #student-image {
            height: 120px;
            width: 120px;
            border-radius: 10px;
            margin-top: 10px;
        }

        span {
            display: block;
            font-weight: bold;
            font-size: 12px;
        }

        table {
            margin-top: 15px;
            width: 100%;
            text-align: left;
        }

        td {
            font-weight: bold;
            padding: 4px;
        }

        .college-code {
            position: absolute;
            left: -60px;
            top: 50%;
            transform: rotate(-90deg) translateY(-50%);
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="main-container">

        <div class="college-code">COLLEGE CODE: BABA</div>

        <img src="https://resources.saylor.org/wwwresources/wp-content/uploads/20200717101134/BITS-VIzag-logo.jpg"
            alt="college-logo">

        <span>Approved by AICTE, New Delhi & Affiliated to JNTUGV</span>
        <span>Accredited by NAAC with "A" Grade</span>
        <span>An ISO 9001:2015 Certified Institute</span>

        <img id="student-image"
            src="https://img.freepik.com/free-photo/young-bearded-man-with-striped-shirt_273609-5677.jpg"
            alt="student-img">

        <table>
            <tr>
                <td>Name</td>
                <td>: Hyma Papana</td>
            </tr>
            <tr>
                <td>Regd.No</td>
                <td>: 23NR1A0565</td>
            </tr>
            <tr>
                <td>Course</td>
                <td>: B.Tech</td>
            </tr>
            <tr>
                <td>Branch</td>
                <td>: CSE</td>
            </tr>
        </table>

    </div>

</body>

</html>
