<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" method="get">
        <fieldset style="background-image: linear-gradient(blue,yellow,white,green,orange);border-radius: 30px;padding: 50px;margin: 40px;">
            <legend align="center">login form </legend>
            <label for="username">Username </label>
            <input type="text" required minlength="5" name="username" id="username" placeholder="Enter username"> <br></br>
            <label for="psw"> password :</label>
            <input type="text" maxlength="13"  name="password" id="psw" placeholder="enter password">
            <br></br>
            <button type="submit">login</button>
            <button type="reset">cancel</button>
        </fieldset>
    </form>

</body>

</html>
