<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset style="background-color: rgb(93, 220, 188); border-radius: 30px;">
            <legend align="center">Job registration</legend>
            <label for="First name">First name:</label>
            <input type="text" maxlength="8" minlength="3" required id="First name" placeholder="Enter"><br><br>
            <label for="Last name">Last name:</label>
            <input type="text" maxlength="8" minlength="3" required id="Last name" placeholder="Enter"><br><br>
            <label for="Email">email:</label>
            <input type="email" required id="Email" placeholder="Enter"><br><br>
            <label for="DOB">DOB:</label>
            <input type="date"><br><br>
            <label for="age">Age:</label>
            <input type="number"><br><br>
            <label for="gender">Gender</label>
            <input type="radio" name="Gender" value="male">Male
            <input type="radio" name="Gender" value="Female">Female
            <input type="radio" name="Gender" value="Others">Others<br><br>
            <label for="Phone no">Phone no:</label>
            <input type="tel" maxlength="10" pattern="[6-9]{1}[0-9]{9}" placeholder="+91"><br><br>
            <label for="State">State:</label>
            <select name="" id="State" >
                <option value="choose">select state</option>
                <option value="AP">AP</option>
                <option value="KA">KA</option>
                <option value="KL">KL</option>
                <option value="DL">DL</option>
                <option value="UP">UP</option>
            </select><br><br>
            <label for="Address">Address:</label>
            <textarea name="text" rows="3" cols="30" id="Address" placeholder="Enter"></textarea><br><br>
            <label for="Skill">Skill:</label>
            <input type="checkbox" name="Skill" value="Node JS">Node.JS
            <input type="checkbox" name="Skill" value="MongoDB">MongoDB
            <input type="checkbox" name="Skill" value="Git">Git
            <input type="checkbox" name="Skill" value="React.Js">React.JS
            <input type="checkbox" name="Skill" value="Express.JS">Express.JS<br><br>
            <label for="Language">Languages:</label>
            <input type="range" >Hindi
            <input type="range" >English
            <input type="range" >Telugu
            <input type="range" >kannada<br><br>
            <label for="Resume">Resume</label>
            <input type="file"><br><br>
            <button type="submit">Submit</button>
            <button type="reset">cancel</button>

        </fieldset>
    </form>
</body>
</html>
