<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
    }
    .box {
      background: white;
      padding: 40px 60px;
      border: 2px solid #28a745;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #28a745;
      margin: 0 0 10px 0;
    }
    p {
      color: #333;
      font-size: 18px;
      margin: 5px 0;
    }
  </style>
</head>
<body>
    <div class="box">
    <h1>Login Successful!</h1>
    <p id="welcome">Welcome</p>
  </div>
</body>
</html>
