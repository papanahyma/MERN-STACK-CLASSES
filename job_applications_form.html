<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
form{
    display:flex;
    justify-content: center;
    align-items: center;
    height: 200vh;
    width: 500px;
    margin: auto;
    background-image: url("1.jpg");
    background-size: cover;
    background-repeat: no-repeat;
}
fieldset{
    border:none;
    backdrop-filter: blur(50px);
    margin:20px;
    padding: 30px;
    border-radius:10px 50px;
    box-shadow: 10px 10px 5px white;
    background-image: url("2.jpg");
    background-size: cover;
    background-repeat: no-repeat;
    backdrop-filter: blur(10px);
    
}
label{
    color: rgb(0, 0, 0);
    font-size: 20px;
    font-weight: bold;
    font-style: italic;
    margin-right: 20px;
}
button{
    padding:10px 30px;
    background-color: hotpink;
    font-weight: bold;
    font-style: italic;
    font-family: 'Courier New', Courier, monospace;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}
</style> 
</head>
<body>
    <form action="">
        <fieldset>
            <legend align="center"><h1>Job Application Form</h1></legend>
            
            <label for="first_name">First Name:</label>
            <input type="text" id="first_name" maxlength="5" minlength="3" placeholder="Enter your first name" name="first_name"><br><br>

            <label for="last_name">Last Name:</label>
            <input type="text" id="last_name" maxlength="5" minlength="3" placeholder="Enter your last name" name="last_name"><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter email id" name="email"><br><br>
            
            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob"><br><br>

            <label for="age">Age:</label>
            <input type="number" id="age" placeholder="Enter your age" name="age"><br><br>

            <label for="gender">Gender:</label><br>
            <input type="radio" name="gender" id="male" value="male"> 
            <label for="male">Male</label>
            <input type="radio" name="gender" id="female" value="female">
            <label for="female">Female</label>
            <input type="radio" name="gender" id="other" value="other">
            <label for="other">Other</label><br><br>

            <label for="phone">Phone No:</label>
            <input type="tel" id="phone" maxlength="10" minlength="10" placeholder="+91" name="phone"><br><br>

            <label for="state">State:</label>
            <select name="state" id="state">
                <option value="">Select State</option>
                <option value="andhra_pradesh">Andhra Pradesh</option>
                <option value="telangana">Telangana</option>
                <option value="karnataka">Karnataka</option>
                <option value="tamil_nadu">Tamil Nadu</option>
                <option value="kerala">Kerala</option>
            </select><br><br>

            <label for="address">Address:</label>
            <textarea id="address" cols="30" rows="4" placeholder="Enter your address" name="address"></textarea><br><br>

            <label>Skills:</label><br>
            <input type="checkbox" name="skills" id="html" value="html">
            <label for="html">HTML</label>
            <input type="checkbox" name="skills" id="css" value="css">
            <label for="css">CSS</label>
            <input type="checkbox" name="skills" id="js" value="js">
            <label for="js">JavaScript</label>
            <input type="checkbox" name="skills" id="nodejs" value="nodejs">
            <label for="nodejs">Node.js</label>
            <input type="checkbox" name="skills" id="c" value="c">
            <label for="c">C</label><br><br>

            <label for="language">Home Language:</label>
            <input type="range" name="language" id="english" value="english" min="0" max="100">
            <label for="english">English</label>
            <input type="range" name="language" id="hindi" value="hindi" min="0" max="100">
            <label for="hindi">Hindi</label>
            <input type="range" name="language" id="telugu" value="telugu" min="0" max="100">
            <label for="telugu">Telugu</label><br><br>

            <label for="resume">resume:</label>
            <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx"><br><br>

            <button type="submit">Submit</button>
        </fieldset>
    </form>
</body>
</html
