<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Example</title>
</head>

<body>

    <h1 align="center">IBM Employee Details</h1>
    <table align="center" border="1" cellspacing="0" cellpadding="10">
        <colgroup>
            <col span="2" bgcolor="gree">
            <col span="1" bgcolor="magenta">
            <col span="2" bgcolor="powderblue">
        </colgroup>
        <thead>
            <tr bgcolor="yellow">
                <th>ID</th>
                <th>Name</th>
                <th>Salary</th>
                <th>Role</th>
                <th>Address</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>E100</td>
                <td>Ravi</td>
                <td>500000</td>
                <td rowspan="2">Developer</td>
                <td>Vizag</td>
                <td>
                    <button>Edit</button>
                    <button>Delete</button>
                </td>
            </tr>
            <tr>
                <td>E200</td>
                <td>Sai</td>
                <td>900000</td>
                <td>Bangalore</td>
                <td>
                    <button>Edit</button>
                    <button>Delete</button>

                </td>
            </tr>
            <tr>
                <td>E300</td>
                <td>Vivek Ayan</td>
                <td>120000</td>
                <td>MERN Developer</td>
                <td>Kochi</td>
                <td>
                    <button>Edit</button>
                    <button>Delete</button>
                    
                </td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td align="center" bgcolor="red" colspan="6">2026 &COPY; copyright</td>
            </tr>
        </tfoot>
    </table>




    <br><br>

    <hr>

    <table border="5" cellspacing="0" cellpadding="10" align="center" bgcolor="salmon">
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
        </tr>
        <tr>
            <td>4</td>
            <td>5</td>
            <td>6</td>
        </tr>
        <tr>
            <td>7</td>
            <td>8</td>
            <td>9</td>
        </tr>
    </table>


</body>

</html>
